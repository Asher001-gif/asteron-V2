name: Build Game for Itch
on:
  push:
    branches: [ main, master ]

# 👇 This fixes the warning by telling GitHub to use Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 👈 Updated this from 20 to 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Upload Zip for Itch.io
        uses: actions/upload-artifact@v4
        with:
          name: itch-game-zip
          path: dist/
